<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ سرزمین - Kingdom World</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --gold:#FFD700; --panel:rgba(15,10,5,0.93); --border:#8B6914; --text:#f0e6c8; --red:#cc3333; --green:#33aa44; }
body { background:#111; color:var(--text); font-family:'Segoe UI',Tahoma,sans-serif; overflow:hidden; user-select:none; touch-action:none; }
#loginScreen { position:fixed; inset:0; z-index:1000; background:radial-gradient(ellipse at 50% 30%, #1a3520 0%, #050a05 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
#loginScreen h1 { font-size:38px; color:var(--gold); text-shadow:0 0 30px #FFD70088; }
.auth-box { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; padding:20px; width:300px; display:flex; flex-direction:column; gap:10px; }
.auth-box input { background:#111; border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:8px; font-size:15px; text-align:center; width:100%; }
.btn-gold { background:linear-gradient(135deg,#8B6914,#FFD700); border:none; color:#1a0a00; padding:11px; border-radius:8px; font-size:15px; font-weight:bold; cursor:pointer; width:100%; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); padding:9px; border-radius:8px; font-size:13px; cursor:pointer; width:100%; }
.color-row { display:flex; gap:8px; justify-content:center; }
.c-opt { width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer; }
.c-opt.sel { border-color:#fff;transform:scale(1.2); }
#authMsg { color:var(--red); font-size:13px; text-align:center; }
.tab-row { display:flex; gap:6px; }
.tab { flex:1; background:#1a1a1a; border:1px solid var(--border); color:#aaa; padding:8px; border-radius:6px; cursor:pointer; font-size:13px; text-align:center; }
.tab.active { background:var(--border); color:var(--gold); }
#gameWrap { display:none; position:relative; width:100vw; height:100vh; }
canvas { display:block; }
#hud { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-start; padding:8px; z-index:100; pointer-events:none; }
.hud-panel { background:var(--panel); border:1.5px solid var(--border); border-radius:8px; padding:6px 10px; pointer-events:all; }
.res-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:5px; }
.res { display:flex; align-items:center; gap:3px; font-size:13px; font-weight:bold; }
#xpBar { width:100%; height:5px; background:#333; border-radius:3px; margin-top:4px; }
#xpFill { height:100%; background:var(--gold); border-radius:3px; }
#hpBar { width:100%; height:6px; background:#333; border-radius:3px; margin-top:3px; }
#hpFill { height:100%; background:var(--red); border-radius:3px; }
#minimap { position:fixed; bottom:80px; right:8px; z-index:100; border:2px solid var(--border); border-radius:4px; }
#bottomBar { position:fixed; bottom:0; left:0; right:0; background:var(--panel); border-top:2px solid var(--border); padding:6px 8px; display:flex; gap:5px; justify-content:center; flex-wrap:wrap; z-index:100; }
.gbtn { background:#2a1a08; border:1.5px solid var(--border); color:var(--text); padding:7px 10px; border-radius:6px; font-size:12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:1px; min-width:54px; }
.gbtn.active { background:#5a3a10; border-color:var(--gold); }
.gbtn span { font-size:18px; }
#joyArea { position:fixed; bottom:80px; left:12px; z-index:100; }
#joyBase { width:100px;height:100px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.25);border-radius:50%;position:relative; }
#joyKnob { width:40px;height:40px;background:rgba(255,215,0,0.65);border:2px solid var(--gold);border-radius:50%;position:absolute;top:30px;left:30px; }
#atkBtn { position:fixed; bottom:90px; right:120px; width:58px;height:58px;background:radial-gradient(#aa1111,#550000); border:3px solid #ff4444;border-radius:50%;font-size:22px; cursor:pointer;z-index:100;display:none;align-items:center;justify-content:center; }
#popup { position:fixed; background:var(--panel); border:2px solid var(--border); border-radius:10px; padding:12px; z-index:200; min-width:180px; display:none; }
#popup h3 { color:var(--gold); font-size:14px; text-align:center; border-bottom:1px solid var(--border); padding-bottom:6px; margin-bottom:8px; }
.pbtn { display:block;width:100%;background:#2a1a08;border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:5px;font-size:13px;cursor:pointer;margin-bottom:5px;text-align:right; }
.pclose { display:block;width:100%;background:#3a0808;border:1px solid var(--red);color:#ff6666;padding:6px;border-radius:5px;font-size:12px;cursor:pointer;text-align:center; }
#chatBox { position:fixed; bottom:80px; left:120px; width:200px; background:rgba(0,0,0,0.7); border:1px solid var(--border); border-radius:8px; z-index:100; overflow:hidden; }
#chatMsgs { height:90px; overflow-y:auto; padding:6px; font-size:11px; }
#chatMsgs .cm { color:#ddd; }
#chatMsgs .cm.sys { color:var(--gold); font-style:italic; }
#chatInput { display:flex; border-top:1px solid var(--border); }
#chatInput input { flex:1;background:#111;border:none;color:var(--text);padding:5px 8px;font-size:12px; }
#chatInput button { background:var(--border);border:none;color:var(--text);padding:5px 8px;cursor:pointer; }
#notif { position:fixed; top:48%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.85); border:2px solid var(--gold); border-radius:10px; padding:12px 20px; font-size:15px; color:var(--gold); z-index:500; display:none; text-align:center; }
#lboard { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:300; display:none; align-items:center; justify-content:center; }
#lboardInner { background:var(--panel); border:2px solid var(--border); border-radius:12px; padding:20px; width:300px; max-height:80vh; overflow-y:auto; }
#lboardInner h2 { color:var(--gold); text-align:center; margin-bottom:12px; }
.lrow { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #333; font-size:13px; }
.lrow.me { color:var(--gold); }
#reportModal { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:400; display:none; align-items:center; justify-content:center; }
#reportInner { background:var(--panel); border:2px solid var(--border); border-radius:12px; padding:20px; width:290px; }
#reportInner h3 { color:var(--red); margin-bottom:10px; text-align:center; }
#reportInner input,#reportInner textarea { width:100%; background:#111; border:1px solid var(--border); color:var(--text); padding:8px; border-radius:6px; margin-bottom:8px; font-size:13px; }
#roleLabel { position:fixed; top:108px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); padding:3px 12px; border-radius:10px; font-size:12px; z-index:100; pointer-events:none; }
</style>
</head>
<body>
<div id="loginScreen">
  <h1>⚔️ سرزمین</h1>
  <p>Kingdom World — بازی آنلاین</p>
  <div class="auth-box">
    <div class="tab-row">
      <div class="tab active" onclick="showTab('login')">ورود</div>
      <div class="tab" onclick="showTab('register')">ثبت‌نام</div>
    </div>
    <div id="loginForm">
      <input id="lUser" type="text" placeholder="نام کاربری" autocomplete="off">
      <input id="lPass" type="password" placeholder="رمز عبور">
      <button class="btn-gold" onclick="doLogin()">ورود به دنیا ⚔️</button>
    </div>
    <div id="regForm" style="display:none">
      <input id="rUser" type="text" placeholder="نام کاربری" autocomplete="off">
      <input id="rPass" type="password" placeholder="رمز عبور">
      <p style="font-size:12px;color:#888;text-align:center">رنگ سرزمینت:</p>
      <div class="color-row">
        <div class="c-opt sel" style="background:#cc3333" data-c="#cc3333"></div>
        <div class="c-opt" style="background:#3366cc" data-c="#3366cc"></div>
        <div class="c-opt" style="background:#33aa44" data-c="#33aa44"></div>
        <div class="c-opt" style="background:#cc8800" data-c="#cc8800"></div>
        <div class="c-opt" style="background:#9933cc" data-c="#9933cc"></div>
        <div class="c-opt" style="background:#cc6633" data-c="#cc6633"></div>
      </div>
      <button class="btn-gold" onclick="doRegister()">ساخت اکانت 🏰</button>
    </div>
    <div id="authMsg"></div>
    <button class="btn-outline" onclick="goAdmin()">🔐 پنل ادمین</button>
  </div>
</div>
<div id="gameWrap">
  <canvas id="gc"></canvas>
  <div id="hud">
    <div class="hud-panel" style="min-width:160px">
      <div id="pName" style="font-weight:bold;color:var(--gold);font-size:13px"></div>
      <div id="hpBar"><div id="hpFill" style="width:100%"></div></div>
      <div style="font-size:11px;color:#aaa;margin-top:2px">❤️ <span id="hpTxt">100/100</span></div>
      <div id="xpBar"><div id="xpFill" style="width:0%"></div></div>
      <div style="font-size:11px;color:#aaa">⭐ لول <span id="lvlTxt">1</span> | XP <span id="xpTxt">0</span></div>
      <div class="res-row">
        <div class="res">🪵<span id="rW">0</span></div>
        <div class="res">🪨<span id="rS">0</span></div>
        <div class="res">🍖<span id="rF">0</span></div>
        <div class="res">💰<span id="rG">0</span></div>
      </div>
    </div>
    <div class="hud-panel" style="display:flex;gap:6px;align-items:center">
      <span id="onlineCnt" style="font-size:12px;color:var(--green)">🟢 1</span>
      <button class="gbtn" style="min-width:auto;padding:4px 8px" onclick="toggleLboard()">🏆</button>
    </div>
  </div>
  <div id="roleLabel">👑 پادشاه</div>
  <canvas id="minimap" width="110" height="110"></canvas>
  <div id="joyArea"><div id="joyBase"><div id="joyKnob"></div></div></div>
  <div id="atkBtn">⚔️</div>
  <div id="chatBox">
    <div id="chatMsgs"></div>
    <div id="chatInput">
      <input id="chatIn" type="text" placeholder="پیام..." maxlength="80">
      <button onclick="sendChat()">➤</button>
    </div>
  </div>
  <div id="bottomBar">
    <button class="gbtn active" id="bMove" onclick="setMode('move')"><span>🚶</span>حرکت</button>
    <button class="gbtn" id="bBuild" onclick="setMode('build')"><span>🏠</span>ساخت</button>
    <button class="gbtn" id="bChop" onclick="setMode('chop')"><span>🪓</span>قطع</button>
    <button class="gbtn" id="bMine" onclick="setMode('mine')"><span>⛏️</span>کندن</button>
    <button class="gbtn" id="bHarvest" onclick="setMode('harvest')"><span>🍖</span>برداشت</button>
    <button class="gbtn" onclick="recruitMenu()"><span>⚔️</span>سرباز</button>
    <button class="gbtn" id="bAttack" onclick="setMode('attack')"><span>🗡️</span>حمله</button>
  </div>
  <div id="popup">
    <h3 id="popTitle"></h3>
    <div id="popContent"></div>
    <button class="pclose" onclick="closePopup()">✕ بستن</button>
  </div>
  <div id="lboard"><div id="lboardInner">
    <h2>🏆 رنکینگ جهانی</h2>
    <div id="lboardList"></div>
    <button class="pclose" style="margin-top:10px" onclick="toggleLboard()">بستن</button>
  </div></div>
  <div id="reportModal"><div id="reportInner">
    <h3>🚨 گزارش تخلف</h3>
    <input id="repTarget" type="text" readonly>
    <textarea id="repReason" placeholder="دلیل..." rows="3"></textarea>
    <button class="btn-gold" onclick="submitReport()">ارسال</button>
    <button class="pclose" style="margin-top:6px" onclick="closeReport()">بستن</button>
  </div></div>
</div>
<div id="notif"></div>
<script>
const TILE=48,MAP_W=80,MAP_H=80;
const T={GRASS:0,WATER:1,TREE:10,STONE:11,RIVER:12,HOUSE:20,TOWER:21,WALL:22,CASTLE:23,FARM:24,CATTLE:30,SHEEP:31,CHICKEN:32};
const EMOJIS={10:'🌲',11:'🪨',12:'💧',20:'🏠',21:'🗼',22:'🧱',23:'🏰',24:'🌾',30:'🐄',31:'🐑',32:'🐔',1:'🌊'};
const COLORS={0:'#4a7c3f',1:'#2a6fba',10:'#2d5a1b',11:'#666',12:'#1a5fa0',20:'#8B4513',21:'#555',22:'#777',23:'#444',24:'#c8a832',30:'#c8a040',31:'#ddd',32:'#e8c840'};
let socket,myToken,myId,myUsername,myColor='#cc3333';
let gameMap=null,players=new Map(),myPlayer=null;
let cam={x:0,y:0},mode='move',joy={dx:0,dy:0,active:false};
let canvas,ctx,mmc,mmx,notifTimer,tick=0;

function showTab(t){
  document.querySelectorAll('.tab').forEach((e,i)=>e.classList.toggle('active',(t==='login'&&i===0)||(t==='register'&&i===1)));
  document.getElementById('loginForm').style.display=t==='login'?'':'none';
  document.getElementById('regForm').style.display=t==='register'?'':'none';
  document.getElementById('authMsg').textContent='';
}
document.querySelectorAll('.c-opt').forEach(o=>o.addEventListener('click',()=>{
  document.querySelectorAll('.c-opt').forEach(x=>x.classList.remove('sel'));
  o.classList.add('sel');myColor=o.dataset.c;
}));
async function doLogin(){
  const username=document.getElementById('lUser').value.trim();
  const password=document.getElementById('lPass').value;
  if(!username||!password){setAuthMsg('همه فیلدها لازمه');return;}
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const d=await r.json();
  if(!d.ok){setAuthMsg(d.msg);return;}
  if(d.isAdmin){window.location='/admin.html';return;}
  myToken=d.token;myUsername=d.username;startGame(d);
}
async function doRegister(){
  const username=document.getElementById('rUser').value.trim();
  const password=document.getElementById('rPass').value;
  if(!username||!password){setAuthMsg('همه فیلدها لازمه');return;}
  const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const d=await r.json();
  if(!d.ok){setAuthMsg(d.msg);return;}
  myToken=d.token;myUsername=d.username;startGame(d);
}
function setAuthMsg(m){document.getElementById('authMsg').textContent=m;}
function goAdmin(){window.location='/admin.html';}
function startGame(userData){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('gameWrap').style.display='block';
  canvas=document.getElementById('gc');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  ctx=canvas.getContext('2d');
  mmc=document.getElementById('minimap');mmx=mmc.getContext('2d');
  document.getElementById('pName').textContent='👑 '+myUsername;
  document.getElementById('lvlTxt').textContent=userData.level||1;
  socket=io();
  socket.on('connect',()=>socket.emit('join',{token:myToken,color:myColor}));
  socket.on('init',d=>{gameMap=d.map;myId=d.myId;for(const p of d.players)players.set(p.id,p);myPlayer=players.get(myId);updateHUD();initControls();requestAnimationFrame(loop);});
  socket.on('playerJoined',p=>{players.set(p.id,p);updateOnline();});
  socket.on('playerLeft',id=>{players.delete(id);updateOnline();});
  socket.on('playerMoved',d=>{const p=players.get(d.id);if(p){p.x=d.x;p.y=d.y;}});
  socket.on('playerUpdated',d=>{const p=players.get(d.id);if(p){p.kills=d.kills;p.xp=d.xp;p.level=d.level;}if(d.id===myId)updateHUD();});
  socket.on('tileChanged',d=>{if(gameMap)gameMap[d.ty][d.tx]=d.tile;});
  socket.on('resources',d=>{if(myPlayer)Object.assign(myPlayer,d);updateHUD();});
  socket.on('damaged',d=>{showNotif('💥 '+d.from+' زد '+d.dmg+' ضرر!');if(myPlayer){myPlayer.hp-=d.dmg;updateHUD();}});
  socket.on('respawn',d=>{if(myPlayer){myPlayer.hp=myPlayer.maxHp;myPlayer.x=d.x;myPlayer.y=d.y;}showNotif('😵 کشته شدی!');});
  socket.on('kill',d=>{addChat('⚔️ '+d.killer+' کشت '+d.victim+' رو',true);});
  socket.on('chat',d=>{addChat(d.username+': '+d.msg);});
  socket.on('systemMsg',m=>{addChat(m,true);});
  socket.on('kicked',m=>{alert(m);window.location.reload();});
  socket.on('notif',m=>{showNotif(m);});
}
function loop(){
  tick++;
  if(!gameMap||!myPlayer){requestAnimationFrame(loop);return;}
  cam.x=myPlayer.x-canvas.width/2;
  cam.y=myPlayer.y-canvas.height/2;
  cam.x=Math.max(0,Math.min(MAP_W*TILE-canvas.width,cam.x));
  cam.y=Math.max(0,Math.min(MAP_H*TILE-canvas.height,cam.y));
  if(joy.dx||joy.dy){
    myPlayer.x+=joy.dx*110/60;myPlayer.y+=joy.dy*110/60;
    myPlayer.x=Math.max(0,Math.min(MAP_W*TILE,myPlayer.x));
    myPlayer.y=Math.max(0,Math.min(MAP_H*TILE,myPlayer.y));
    if(tick%3===0)socket.emit('move',{x:myPlayer.x,y:myPlayer.y});
  }
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const sx=Math.floor(cam.x/TILE),ex=Math.ceil((cam.x+canvas.width)/TILE);
  const sy=Math.floor(cam.y/TILE),ey=Math.ceil((cam.y+canvas.height)/TILE);
  for(let ty=sy;ty<=ey;ty++){for(let tx=sx;tx<=ex;tx++){
    if(ty<0||ty>=MAP_H||tx<0||tx>=MAP_W)continue;
    const tile=gameMap[ty][tx];
    const px=tx*TILE-cam.x,py=ty*TILE-cam.y;
    ctx.fillStyle=COLORS[tile.type]||'#4a7c3f';ctx.fillRect(px,py,TILE,TILE);
    ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.strokeRect(px,py,TILE,TILE);
    if(tile.owner){const op=players.get(tile.owner);if(op){ctx.fillStyle=op.color+'44';ctx.fillRect(px,py,TILE,TILE);}}
    const em=EMOJIS[tile.type];
    if(em){ctx.font=(TILE*0.6)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(em,px+TILE/2,py+TILE/2);}
  }}
  for(const[id,p]of players){
    const sx2=p.x-cam.x,sy2=p.y-cam.y;
    if(sx2<-60||sx2>canvas.width+60||sy2<-60||sy2>canvas.height+60)continue;
    const r=id===myId?18:14;
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(sx2,sy2+r,r*0.7,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=p.color||'#cc3333';ctx.beginPath();ctx.arc(sx2,sy2,r,0,Math.PI*2);ctx.fill();
    if(id===myId){ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(sx2,sy2,r+3,0,Math.PI*2);ctx.stroke();}
    ctx.font=r+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('👑',sx2,sy2);
    ctx.fillStyle='white';ctx.font='bold 9px sans-serif';ctx.fillText(p.username,sx2,sy2-r-7);
    const bw=r*2.5;
    ctx.fillStyle='#333';ctx.fillRect(sx2-bw/2,sy2-r-18,bw,5);
    ctx.fillStyle=p.hp>60?'#44cc44':p.hp>30?'#ccaa00':'#cc3333';
    ctx.fillRect(sx2-bw/2,sy2-r-18,bw*(p.hp/p.maxHp),5);
  }
  const mw=mmc.width,mh=mmc.height,sw=mw/MAP_W,sh=mh/MAP_H;
  mmx.fillStyle='#0a1a0a';mmx.fillRect(0,0,mw,mh);
  for(let ty=0;ty<MAP_H;ty+=2){for(let tx=0;tx<MAP_W;tx+=2){
    const t=gameMap[ty][tx];
    mmx.fillStyle=t.type===1||t.type===12?'#2a6fba':t.type===10?'#2d5a1b':'#4a7c3f';
    mmx.fillRect(tx*sw,ty*sh,sw*2,sh*2);
  }}
  for(const[id,p]of players){mmx.fillStyle=p.color||'#cc3333';mmx.fillRect(p.x/TILE*sw-1.5,p.y/TILE*sh-1.5,4,4);}
  mmx.strokeStyle='rgba(255,255,255,0.4)';mmx.lineWidth=1;
  mmx.strokeRect(cam.x/TILE*sw,cam.y/TILE*sh,canvas.width/TILE*sw,canvas.height/TILE*sh);
  requestAnimationFrame(loop);
}
function updateHUD(){
  const p=myPlayer;if(!p)return;
  document.getElementById('hpFill').style.width=(p.hp/p.maxHp*100)+'%';
  document.getElementById('hpTxt').textContent=Math.max(0,Math.round(p.hp))+'/'+p.maxHp;
  document.getElementById('lvlTxt').textContent=p.level||1;
  document.getElementById('xpTxt').textContent=p.xp||0;
  document.getElementById('xpFill').style.width=((p.xp%1000)/10)+'%';
  document.getElementById('rW').textContent=p.wood||0;
  document.getElementById('rS').textContent=p.stone||0;
  document.getElementById('rF').textContent=p.food||0;
  document.getElementById('rG').textContent=p.gold||0;
}
function updateOnline(){document.getElementById('onlineCnt').textContent='🟢 '+players.size;}
function initControls(){
  const jb=document.getElementById('joyBase'),jk=document.getElementById('joyKnob');
  let sx,sy,tid;const MAX=38;
  jb.addEventListener('touchstart',e=>{const t=e.touches[0];sx=t.clientX;sy=t.clientY;tid=t.identifier;joy.active=true;},{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!joy.active)return;
    const t=Array.from(e.touches).find(x=>x.identifier===tid)||e.touches[0];if(!t)return;
    let dx=t.clientX-sx,dy=t.clientY-sy;
    const len=Math.sqrt(dx*dx+dy*dy);if(len>MAX){dx=dx/len*MAX;dy=dy/len*MAX;}
    jk.style.left=(30+dx)+'px';jk.style.top=(30+dy)+'px';joy.dx=dx/MAX;joy.dy=dy/MAX;
  },{passive:true});
  document.addEventListener('touchend',()=>{joy.dx=0;joy.dy=0;joy.active=false;jk.style.left='30px';jk.style.top='30px';});
  canvas.addEventListener('click',handleClick);
  canvas.addEventListener('touchend',e=>{e.preventDefault();handleClick(e);},{passive:false});
  document.getElementById('atkBtn').addEventListener('click',()=>{
    if(!myPlayer)return;
    let nearest=null,minD=Infinity;
    for(const[id,p]of players){if(id===myId)continue;const dx=p.x-myPlayer.x,dy=p.y-myPlayer.y,d=Math.sqrt(dx*dx+dy*dy);if(d<minD){minD=d;nearest=id;}}
    if(nearest&&minD<200){socket.emit('attack',{targetId:nearest});showNotif('⚔️ حمله!');}
    else showNotif('❌ دشمنی نزدیک نیست');
  });
  document.getElementById('chatIn').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});
  document.addEventListener('keydown',e=>{
    if(['ArrowLeft','KeyA'].includes(e.code))joy.dx=-1;if(['ArrowRight','KeyD'].includes(e.code))joy.dx=1;
    if(['ArrowUp','KeyW'].includes(e.code))joy.dy=-1;if(['ArrowDown','KeyS'].includes(e.code))joy.dy=1;
  });
  document.addEventListener('keyup',e=>{
    if(['ArrowLeft','KeyA','ArrowRight','KeyD'].includes(e.code))joy.dx=0;
    if(['ArrowUp','KeyW','ArrowDown','KeyS'].includes(e.code))joy.dy=0;
  });
  window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
}
function handleClick(e){
  const rect=canvas.getBoundingClientRect();
  const cx=(e.clientX||e.changedTouches[0].clientX)-rect.left;
  const cy=(e.clientY||e.changedTouches[0].clientY)-rect.top;
  const wx=cx+cam.x,wy=cy+cam.y;
  const tx=Math.floor(wx/TILE),ty=Math.floor(wy/TILE);
  for(const[id,p]of players){
    if(id===myId)continue;
    const dx=p.x-wx,dy=p.y-wy;
    if(Math.sqrt(dx*dx+dy*dy)<24){showPopup('دشمن: '+p.username,cx,cy,[{label:'🗡️ حمله!',fn:()=>{socket.emit('attack',{targetId:id});closePopup();}},{label:'🚨 گزارش',fn:()=>{openReport(p.username);closePopup();}}]);return;}
  }
  if(tx<0||tx>=MAP_W||ty<0||ty>=MAP_H)return;
  const tile=gameMap[ty][tx];
  if(mode==='chop'&&tile.type===T.TREE)socket.emit('chop',{tx,ty});
  else if(mode==='mine'&&tile.type===T.STONE)socket.emit('mine',{tx,ty});
  else if(mode==='harvest'&&[T.CATTLE,T.SHEEP,T.CHICKEN,T.RIVER].includes(tile.type))socket.emit('harvest',{tx,ty});
  else if(mode==='build')showBuildMenu(tx,ty,cx,cy);
  else if(mode==='attack'){myPlayer.x=wx;myPlayer.y=wy;socket.emit('move',{x:wx,y:wy});}
}
function setMode(m){
  mode=m;
  ['Move','Build','Chop','Mine','Harvest','Attack'].forEach(n=>{const b=document.getElementById('b'+n);if(b)b.classList.toggle('active',n.toLowerCase()===m);});
}
function showBuildMenu(tx,ty,sx,sy){
  showPopup('🏗️ ساخت',sx,sy,[
    {label:'🏠 خونه (🪵15 🪨5)',fn:()=>{socket.emit('build',{tx,ty,type:20});closePopup();}},
    {label:'🗼 برج (🪵10 🪨20)',fn:()=>{socket.emit('build',{tx,ty,type:21});closePopup();}},
    {label:'🧱 دیوار (🪨8)',fn:()=>{socket.emit('build',{tx,ty,type:22});closePopup();}},
    {label:'🏰 قلعه (🪵50 🪨80)',fn:()=>{socket.emit('build',{tx,ty,type:23});closePopup();}},
    {label:'🌾 مزرعه (🪵20)',fn:()=>{socket.emit('build',{tx,ty,type:24});closePopup();}},
  ]);
}
function recruitMenu(){
  showPopup('⚔️ استخدام',window.innerWidth/2,window.innerHeight/2,[
    {label:'⚔️ سرباز شمشیر (💰40 🍖20)',fn:()=>{socket.emit('recruit',{role:'soldier',weapon:'sword'});closePopup();}},
    {label:'🏹 کمان‌دار (💰40 🍖20)',fn:()=>{socket.emit('recruit',{role:'soldier',weapon:'bow'});closePopup();}},
    {label:'💣 توپچی (💰60 🍖30)',fn:()=>{socket.emit('recruit',{role:'soldier',weapon:'cannon'});closePopup();}},
    {label:'👨‍🌾 شهروند (💰20 🍖10)',fn:()=>{socket.emit('recruit',{role:'citizen',weapon:'none'});closePopup();}},
  ]);
}
function showPopup(title,sx,sy,items){
  const pop=document.getElementById('popup');
  document.getElementById('popTitle').textContent=title;
  const cont=document.getElementById('popContent');cont.innerHTML='';
  items.forEach(it=>{const b=document.createElement('button');b.className='pbtn';b.textContent=it.label;b.onclick=it.fn;cont.appendChild(b);});
  pop.style.display='block';
  pop.style.left=Math.min(sx,window.innerWidth-200)+'px';
  pop.style.top=Math.min(sy,window.innerHeight-200)+'px';
}
function closePopup(){document.getElementById('popup').style.display='none';}
function addChat(msg,sys=false){
  const el=document.getElementById('chatMsgs');
  const d=document.createElement('div');d.className='cm'+(sys?' sys':'');d.textContent=msg;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
  if(el.children.length>50)el.removeChild(el.children[0]);
}
function sendChat(){const inp=document.getElementById('chatIn');const msg=inp.value.trim();if(!msg)return;socket.emit('chat',msg);inp.value='';}
async function toggleLboard(){
  const lb=document.getElementById('lboard');
  if(lb.style.display==='flex'){lb.style.display='none';return;}
  const r=await fetch('/api/leaderboard');const data=await r.json();
  document.getElementById('lboardList').innerHTML=data.map((u,i)=>`<div class="lrow${u.username===myUsername?' me':''}""><span>${i+1}. ${u.username}</span><span>لول ${u.level} | کشت ${u.kills}</span></div>`).join('');
  lb.style.display='flex';
}
function openReport(username){document.getElementById('repTarget').value=username;document.getElementById('repReason').value='';document.getElementById('reportModal').style.display='flex';}
function closeReport(){document.getElementById('reportModal').style.display='none';}
function submitReport(){
  const reported=document.getElementById('repTarget').value;
  const reason=document.getElementById('repReason').value.trim();
  if(!reason){showNotif('❌ دلیل بنویس');return;}
  socket.emit('report',{reported,reason});closeReport();showNotif('✅ گزارش ثبت شد');
}
function showNotif(msg){
  const el=document.getElementById('notif');el.textContent=msg;el.style.display='block';
  clearTimeout(notifTimer);notifTimer=setTimeout(()=>el.style.display='none',2000);
}
</script>
</body>
